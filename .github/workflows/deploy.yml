name: Build and deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync HTML and other (short cache, must-revalidate)
        run: |
          aws s3 sync out/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --exclude "_next/static/*" \
            --exclude "images/*" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Sync hashed static (long cache, immutable)
        run: |
          aws s3 sync out/_next/static/ "s3://${{ vars.S3_BUCKET }}/_next/static/" \
            --cache-control "public, max-age=31536000, immutable"
          if [ -d out/images ]; then
            aws s3 sync out/images/ "s3://${{ vars.S3_BUCKET }}/images/" \
              --cache-control "public, max-age=2592000"
          fi

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
